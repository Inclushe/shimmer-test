<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#05060a" />
<title>Dots</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #05060a; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  canvas { display: block; width: 100vw; height: 100vh; }

  /* Activation button (shown when the browser gates orientation sensors) */
  #enable {
    position: fixed;
    top: calc(env(safe-area-inset-top, 0px) + 16px);
    right: calc(env(safe-area-inset-right, 0px) + 16px);
    z-index: 10;
    padding: 11px 16px;
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 999px;
    background: rgba(20,22,30,0.6);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 0.2px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    transition: opacity .25s ease, transform .15s ease;
  }
  #enable:active { transform: scale(0.96); }
  #enable.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <canvas id="c"></canvas>
  <button id="enable" class="hidden">Tap to activate</button>

<script>
(() => {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const enableBtn = document.getElementById("enable");

  // --- Tunables ---------------------------------------------------------
  const DOT_RADIUS = 1;          // 2px dots
  const SPOT = 0.85;             // angular radius (radians) of the "lit" zone
  const BASE_GRAY = 60;          // brightness of a far-away dot (0-255)
  const SPREAD = 0.8;            // how far (radians) targets scatter from the start

  // --- Dot grid ---------------------------------------------------------
  // Each dot carries `target`: a unit vector representing an orientation it
  // "responds" to. Targets are scattered within SPREAD radians of the
  // device's initial orientation, and are only assigned once that first
  // orientation reading arrives. The closer the device's current orientation
  // is to a dot's target, the whiter the dot.
  let dots = [];
  let cols = 0, rows = 0, spacing = 0;
  let W = 0, H = 0, dpr = 1;
  let initialVec = null;         // captured on the first orientation event

  // Pick a random unit vector within `maxAngle` radians of `axis`.
  function randomVectorNear(axis, maxAngle) {
    // Build an orthonormal basis (axis, u, v).
    const ref = Math.abs(axis[0]) < 0.9 ? [1, 0, 0] : [0, 1, 0];
    let ux = axis[1] * ref[2] - axis[2] * ref[1];
    let uy = axis[2] * ref[0] - axis[0] * ref[2];
    let uz = axis[0] * ref[1] - axis[1] * ref[0];
    const ul = Math.hypot(ux, uy, uz) || 1;
    ux /= ul; uy /= ul; uz /= ul;
    const vx = axis[1] * uz - axis[2] * uy;
    const vy = axis[2] * ux - axis[0] * uz;
    const vz = axis[0] * uy - axis[1] * ux;

    const phi = Math.random() * Math.PI * 2;
    const theta = maxAngle * Math.sqrt(Math.random()); // area-weighted
    const sT = Math.sin(theta), cT = Math.cos(theta);
    const cp = Math.cos(phi), sp = Math.sin(phi);
    return [
      axis[0] * cT + (ux * cp + vx * sp) * sT,
      axis[1] * cT + (uy * cp + vy * sp) * sT,
      axis[2] * cT + (uz * cp + vz * sp) * sT,
    ];
  }

  // (Re)assign every dot a target near the initial orientation.
  function assignTargets() {
    if (!initialVec) return;
    for (let k = 0; k < dots.length; k++) {
      dots[k].target = randomVectorNear(initialVec, SPREAD);
    }
  }

  function buildGrid() {
    dpr = Math.min(window.devicePixelRatio || 1, 2.5);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.round(W * dpr);
    canvas.height = Math.round(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Density scales with screen size; aim for a tight dotted texture.
    spacing = Math.max(14, Math.min(W, H) / 34);
    cols = Math.ceil(W / spacing) + 1;
    rows = Math.ceil(H / spacing) + 1;

    dots = [];
    for (let j = 0; j < rows; j++) {
      for (let i = 0; i < cols; i++) {
        dots.push({
          x: i * spacing,
          y: j * spacing,
          target: null, // assigned once the initial orientation is known
        });
      }
    }
    assignTargets(); // no-op until the first orientation reading arrives
  }

  // --- Orientation -> direction vector ----------------------------------
  // Current device orientation, smoothed, as a unit vector. This is the
  // image of the screen normal [0,0,1] under the device's rotation.
  let cur = [0, 0, 1];
  let targetVec = [0, 0, 1];

  // Convert (alpha, beta, gamma) Euler angles (degrees, ZXY order per the
  // W3C DeviceOrientation spec) into a quaternion, then rotate [0,0,1].
  function orientationToVector(alphaDeg, betaDeg, gammaDeg) {
    const _z = (alphaDeg || 0) * Math.PI / 180; // alpha: around Z
    const _x = (betaDeg  || 0) * Math.PI / 180; // beta:  around X
    const _y = (gammaDeg || 0) * Math.PI / 180; // gamma: around Y

    const cX = Math.cos(_x / 2), cY = Math.cos(_y / 2), cZ = Math.cos(_z / 2);
    const sX = Math.sin(_x / 2), sY = Math.sin(_y / 2), sZ = Math.sin(_z / 2);

    // Quaternion for ZXY rotation order.
    const w = cX * cY * cZ - sX * sY * sZ;
    const x = sX * cY * cZ - cX * sY * sZ;
    const y = cX * sY * cZ + sX * cY * sZ;
    const z = cX * cY * sZ + sX * sY * cZ;

    // Rotate the reference vector [0,0,1] by this quaternion: the third
    // column of the corresponding rotation matrix.
    return [
      2 * (x * z + w * y),
      2 * (y * z - w * x),
      1 - 2 * (x * x + y * y),
    ];
  }

  function onOrientation(e) {
    if (e.alpha == null && e.beta == null && e.gamma == null) return;
    targetVec = orientationToVector(e.alpha, e.beta, e.gamma);
    if (!initialVec) {
      // First reading: anchor the dot targets around this orientation.
      initialVec = targetVec.slice();
      cur = targetVec.slice();
      assignTargets();
    }
  }

  // --- Render loop ------------------------------------------------------
  function frame() {
    // Smooth toward the latest orientation, then renormalize.
    cur[0] += (targetVec[0] - cur[0]) * 0.15;
    cur[1] += (targetVec[1] - cur[1]) * 0.15;
    cur[2] += (targetVec[2] - cur[2]) * 0.15;
    const len = Math.hypot(cur[0], cur[1], cur[2]) || 1;
    const vx = cur[0] / len, vy = cur[1] / len, vz = cur[2] / len;

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = "#05060a";
    ctx.fillRect(0, 0, W, H);

    for (let k = 0; k < dots.length; k++) {
      const d = dots[k];
      const t = d.target;
      let g = BASE_GRAY;
      if (t) {
        // Angular distance between current orientation and this dot's target.
        let dot = vx * t[0] + vy * t[1] + vz * t[2];
        if (dot > 1) dot = 1; else if (dot < -1) dot = -1;
        const ang = Math.acos(dot); // 0 = exact match, PI = opposite

        // Closeness in [0,1]; whiter as the orientation nears the target.
        const close = Math.max(0, 1 - ang / SPOT);
        g = Math.round(BASE_GRAY + (255 - BASE_GRAY) * (close * close));
      }

      ctx.fillStyle = "rgb(" + g + "," + g + "," + g + ")";
      ctx.beginPath();
      ctx.arc(d.x, d.y, DOT_RADIUS, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(frame);
  }

  // --- Pointer fallback (desktop / no sensor) ---------------------------
  // Maps the cursor to a synthetic orientation so the effect is testable
  // without a real device sensor.
  function onPointer(e) {
    const px = (e.clientX / W) * 2 - 1;   // -1..1
    const py = (e.clientY / H) * 2 - 1;   // -1..1
    const v = [px, py, Math.sqrt(Math.max(0, 1 - px * px - py * py))];
    targetVec = v;
    if (!initialVec) {
      // Desktop has no real "initial" event; anchor on first pointer move.
      initialVec = targetVec.slice();
      cur = targetVec.slice();
      assignTargets();
    }
  }

  // --- Sensor permission flow ------------------------------------------
  // iOS 13+ Safari (and some others) require an explicit user gesture +
  // requestPermission() before DeviceOrientationEvent fires.
  const needsPermission =
    typeof DeviceOrientationEvent !== "undefined" &&
    typeof DeviceOrientationEvent.requestPermission === "function";

  function startListening() {
    window.addEventListener("deviceorientation", onOrientation, { passive: true });
  }

  function requestAndStart() {
    DeviceOrientationEvent.requestPermission()
      .then((state) => {
        if (state === "granted") {
          startListening();
          enableBtn.classList.add("hidden");
        } else {
          enableBtn.textContent = "Motion blocked — retry";
        }
      })
      .catch(() => { enableBtn.textContent = "Tap to activate"; });
  }

  if (needsPermission) {
    enableBtn.classList.remove("hidden");
    enableBtn.addEventListener("click", requestAndStart);
  } else if (typeof DeviceOrientationEvent !== "undefined") {
    // Browsers that don't gate the sensor: just listen.
    startListening();
  }

  // Pointer fallback so it's alive on desktop and before activation.
  window.addEventListener("pointermove", onPointer, { passive: true });

  window.addEventListener("resize", buildGrid);
  window.addEventListener("orientationchange", () => setTimeout(buildGrid, 200));

  buildGrid();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
